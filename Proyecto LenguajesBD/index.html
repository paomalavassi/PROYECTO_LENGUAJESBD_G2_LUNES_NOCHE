<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Condominio Las Aralias</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>

<body>
    <header>
        <h1>Sistema de Control de Accesos</h1>
        <h2>Condominio Las Aralias</h2>
    </header>

    <main>
        <section class="seccion-login">
            <h2>Iniciar sesión</h2>
            <p>Ingrese sus credenciales para acceder al sistema</p>

            <div class="contenedor-login-unico">
                <div class="card-rol card-login-unico">
                    <form id="formLogin">
                        <label for="loginUsuario">Usuario</label>
                        <input type="text" id="loginUsuario" placeholder="Usuario">

                        <label for="loginClave">Contraseña</label>
                        <input type="password" id="loginClave" placeholder="Contraseña">

                        <label for="loginRol">Ingresar como</label>
                        <select id="loginRol">
                            <option value="guardia">Guardia</option>
                            <option value="admin">Administrador</option>
                        </select>

                        <span id="errorLogin" class="mensaje-error"></span>
                        <button type="submit">Ingresar</button>
                    </form>
                </div>
            </div>
        </section>
    </main>

    <footer>
        <p>Proyecto de Lenguajes de Base de Datos</p>
    </footer>

    <script>
        document.getElementById("formLogin").addEventListener("submit", async function (event) {
            event.preventDefault();
            const usuario = document.getElementById("loginUsuario").value.trim();
            const clave   = document.getElementById("loginClave").value.trim();
            const rol     = document.getElementById("loginRol").value;
            const errorEl = document.getElementById("errorLogin");

            errorEl.style.display = 'none';
            errorEl.innerText = '';

            if (!usuario || !clave) {
                errorEl.innerText = "Por favor complete todos los campos.";
                errorEl.style.display = "block";
                return;
            }

            try {
                const res = await fetch('api/datos.php', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                    body: new URLSearchParams({ accion: 'login', usuario, clave, rol })
                });
                const data = await res.json();
                if (data.error) {
                    errorEl.innerText = data.mensaje;
                    errorEl.style.display = 'block';
                } else {
                    sessionStorage.setItem('id_persona', data.id_persona);
                    sessionStorage.setItem('nombre',     data.nombre);
                    sessionStorage.setItem('rol',        data.rol);
                    window.location.href = (rol === 'guardia') ? 'guardia.html' : 'admin.html';
                }
            } catch (err) {
                errorEl.innerText = 'Error de conexion con el servidor.';
                errorEl.style.display = 'block';
            }
        });
    </script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
